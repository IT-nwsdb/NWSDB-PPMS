<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Project Progress Monitoring System</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <link rel="stylesheet" href="styles.css" />
</head>

<body class="bg-soft">
  <!-- Loading Screen (2 seconds) -->
  <div id="loader" class="loader-wrap" aria-live="polite" aria-busy="true">
    <div class="loader-card text-center">
      <div class="fw-bold mb-2" style="letter-spacing:.2px;">Project Progress Monitoring System</div>
      <div class="d-flex align-items-center justify-content-center gap-3">
        <div class="spinner-border" role="status" aria-label="Loading"></div>
        <div class="text-start">
          <div class="fw-semibold">Loading projects…</div>
          <div class="small text-muted">Just a moment</div>
        </div>
      </div>

      <div class="progress mt-4" style="height: 8px;" aria-label="Loading progress">
        <div id="loaderBar" class="progress-bar progress-bar-striped progress-bar-animated" style="width: 15%"></div>
      </div>
    </div>
  </div>

  <!-- Home: ONLY CARDS (centered) -->
  <main id="app" class="d-none app-center">
    <div class="container">
      <div class="page-head">
        <h1>Choose a Project</h1>
        <p>Select one category to continue</p>
      </div>
      <div id="cardsGrid" class="row g-3 justify-content-center">
        <!-- Cards injected by JS -->
      </div>
    </div>
  </main>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>E&S Entry</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary px-3">
  <a class="navbar-brand fw-semibold text-white text-decoration-none" href="../index.html" title="Back to Project Selector">E&S Entry</a>
  <div class="d-flex gap-2">
    <button class="btn btn-outline-light btn-sm" id="btnAddProject">+ Project</button>
    <button class="btn btn-light btn-sm" id="btnAddRow">+ Row</button>
    <button class="btn btn-warning btn-sm" id="btnSave">Save</button>
    <button class="btn btn-danger btn-sm" id="btnReset">Reset</button>
  </div>
</nav>

<main class="container-fluid py-3">
  

  <div class="table-responsive">
    <table class="table table-bordered table-sm align-middle mb-0" id="sheet">
      
      <colgroup>
        <col style="width: 380px;">
        <col style="width: 140px;">
        <col style="width: 150px;">
        <col style="width: 130px;">
        <col style="width: 130px;">
        <col style="width: 150px;">
        <col style="width: 150px;">
        <col style="width: 70px;">
      </colgroup>
<thead class="table-light sticky-top">
        <tr>
          <th style="min-width:260px;" rowspan="2">Sub Project / Activity</th>
          <th style="min-width:140px;" class="text-end" rowspan="2">Contract (LKR Mn)</th>
          <th style="min-width:140px;" class="text-end" rowspan="2">Allocation 2026 (Rs Mn)</th>
          <th style="min-width:140px;" rowspan="2">Start Date</th>
          <th style="min-width:140px;" rowspan="2">End Date</th>
          <th style="min-width:280px;" colspan="2" class="text-center">Cumulative Progress</th>
          <th style="width:1%;" rowspan="2">Actions</th>
        </tr>
        <tr>
          <th style="min-width:140px;" class="text-end">Up to last month</th>
          <th style="min-width:140px;" class="text-end">Up to current month</th>
        </tr>
      </thead>
      <tbody id="body"></tbody>
    </table>
  </div>

  <div id="msg" class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999;"></div>
</main>

<script type="module" src="./app.js"></script>
</body>
</html>
